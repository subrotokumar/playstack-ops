{{ if .Values.imageRegistryCron.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $.Chart.Name }}-{{ .Values.imageRegistryCron.name }}-cj
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/version: {{ .Values.appVersion }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/environment: {{ .Values.environment }}
spec:
  schedule: {{ .Values.imageRegistryCron.schedule | quote }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 60
      template:
        spec:
          serviceAccountName: {{ $.Chart.Name }}-ecr-refresh-sa
          restartPolicy: Never
          containers:
            - name: refresh
              image: public.ecr.aws/aws-cli/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  yum install -y wget
                  wget -O kubectl "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
                  chmod +x kubectl && mv kubectl /usr/local/bin/

                  ECR_PASSWORD=$(aws ecr get-login-password --region {{ .Values.imageRegistryCron.awsRegion }})

                  kubectl create secret docker-registry {{ .Chart.Name }}-{{ .Values.imageRegistrySecret }}-sk \
                    --docker-server={{ .Values.registry }} \
                    --docker-username=AWS \
                    --docker-password="${ECR_PASSWORD}" \
                    --namespace {{ .Values.namespace | default .Release.Namespace }} \
                    --dry-run=client -o yaml \
                  | kubectl apply -f -
              envFrom:
                {{- range .Values.imageRegistryCron.secretRef }}
                - secretRef:
                    name: {{ $.Chart.Name }}-{{ . }}-sk
                {{- end }}
{{ end }}