{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: {{ .Chart.Name }}-{{ .Values.backend.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/version: {{ .Values.appVersion }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/environment: {{ .Values.environment }}
spec:
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-{{ .Values.backend.name }}
  replicas: {{ default 1 .Values.replicaCount | int }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-{{ .Values.backend.name }}
    spec:
      imagePullSecrets:
        - name: playstack-image-registry-sk
      containers:
        - name: {{ .Chart.Name }}-{{ .Values.backend.name }}
          image: {{ .Values.registry }}/{{ .Chart.Name }}/{{ .Values.backend.name }}:{{ .Values.appVersion }}
          imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.service.internalPort | int }}
          envFrom:
            - configMapRef:
                name: "{{ .Chart.Name }}-{{ .Values.backend.name }}-cm"
            {{- if .Values.backend.configMapRef }}
            {{- range .Values.backend.configMapRef }}
            - configMapRef:
                name: {{ $.Chart.Name }}-{{ . }}-cm
            {{- end }}
            {{- end }}
            {{- range .Values.backend.secretRef }}
            - secretRef:
                name: {{ $.Chart.Name }}-{{ . }}-sk
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port | int }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port | int }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}